<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Fluency Framework & Foundations 学习系统 — 基于 Anthropic Academy 课程的完整学习、复习与自测平台。">
  <title>AI Fluency 学习系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== 顶部导航 ===== -->
  <header class="topnav" id="topnav">
    <div class="topnav-brand" onclick="router.go('home')">
      <span class="brand-icon">🧠</span>
      <span class="brand-text">AI Fluency 学习系统</span>
    </div>
    <nav class="topnav-links">
      <a class="nav-link active" data-page="home" onclick="router.go('home')">🗺️ 课程地图</a>
      <a class="nav-link" data-page="4ds" onclick="router.go('4ds')">🧩 4Ds</a>
      <a class="nav-link" data-page="goals" onclick="router.go('goals')">🎯 四重目标</a>
      <a class="nav-link" data-page="review" onclick="router.go('review')">📝 自测</a>
    </nav>
    <div class="topnav-right">
      <div class="mode-switch" id="modeSwitch">
        <button class="mode-btn active" data-mode="browse" onclick="switchMode('browse')">浏览</button>
        <button class="mode-btn" data-mode="study" onclick="switchMode('study')">精读</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索知识点…" autocomplete="off">
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
    </div>
  </header>

  <!-- ===== 主内容 ===== -->
  <main class="main" id="main"></main>

  <!-- ===== 数据 ===== -->
  <script src="js/data.js"></script>
  <script src="js/data2.js"></script>
  <script src="js/data3.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
